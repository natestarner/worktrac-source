spring:
  application:
    name: backend
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: validate    # Flyway manages schema — never change this
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        # All timestamps are stored/compared in UTC (session/set times per CLAUDE.md);
        # pin the JDBC boundary to UTC so java.time.Instant <-> DATETIME2 round-trips
        # consistently regardless of the JVM's local timezone.
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    clean-disabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}
  # Azure Container Apps' ingress is the sole external entry point for this container --
  # nothing can reach port 8080 directly, bypassing it -- and it sets X-Forwarded-* headers
  # itself on every request it forwards, so trusting them here is safe. "framework" (Spring's
  # own ForwardedHeaderFilter, a plain Servlet Filter) is used instead of Tomcat's
  # RemoteIpValve because a Valve only runs inside a real embedded Tomcat connector and is
  # invisible to MockMvc-based tests (MockMvc drives the filter chain directly, never a real
  # connector) -- RemoteIpValve would make this behavior untestable. Safe locally too: with no
  # reverse proxy in front of `mvn spring-boot:run`, ordinary local requests never carry
  # X-Forwarded-* headers, so this filter has nothing to rewrite and getRemoteAddr() behaves
  # exactly as before. Without this, the per-IP registration/reset rate limiter
  # (RegistrationRateLimiter) bucketed every external user under the ingress's own hop
  # address instead of the real client IP.
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  jwt:
    secret: ${APP_JWT_SECRET}
    expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:43200}    # 30 days
  email:
    connection-string: ${ACS_EMAIL_CONNECTION_STRING}
    sender-address: ${ACS_EMAIL_SENDER_ADDRESS}
    code-expiration-minutes: ${APP_EMAIL_CODE_EXPIRATION_MINUTES:15}
    app-url: ${APP_EMAIL_APP_URL}
    # Empty (not required) so production startup never depends on this -- the
    # test-support endpoint's controller bean doesn't exist outside local/lower anyway.
    test-support-key: ${E2E_TEST_SUPPORT_KEY:}
  rate-limit:
    per-ip-per-hour: ${APP_RATE_LIMIT_PER_IP_PER_HOUR:10}
    global-email-sends-per-hour: ${APP_RATE_LIMIT_GLOBAL_EMAIL_SENDS_PER_HOUR:30}
