<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Huddle Registration Success Email</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { margin:0; background:#EDE7DA; font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif; padding:40px 0; }
  a { color:#B5542D; }
  a:hover { color:#8f3f1f; }
</style>
</head>
<body>

<div style="width:600px;margin:0 auto;background:#F2EDE1;border-radius:20px;overflow:hidden;box-shadow:0 20px 50px rgba(22,59,62,0.18);font-family:'Inter',sans-serif;">

  <!-- header band -->
  <div style="background:#163B3E;padding:36px 48px;">
    <img src="{{LOGO_URL}}" width="216" height="77" alt="Huddle" style="display:block;border:0;outline:none;text-decoration:none;">
  </div>

  <!-- body -->
  <div style="padding:48px;">
    <div style="width:56px;height:56px;border-radius:50%;background:#E7F0EA;display:flex;align-items:center;justify-content:center;margin-bottom:22px;">
      <div style="width:16px;height:9px;border-left:3.5px solid #2F6B4F;border-bottom:3.5px solid #2F6B4F;transform:rotate(-45deg) translate(1px,-2px);"></div>
    </div>
    <div style="font-family:'Poppins',sans-serif;font-size:26px;font-weight:700;color:#163B3E;letter-spacing:-0.01em;margin-bottom:12px;">You're all set!</div>
    <div style="font-size:16px;line-height:1.6;color:#3F3A32;margin-bottom:32px;">Your Huddle account is confirmed and ready to go. Add the rest of your crew, pick your first exercise, and start logging sets &mdash; your history and PRs will be right there waiting every time you come back.</div>

    <div style="text-align:center;margin-bottom:8px;">
      <a href="{{APP_URL}}" style="display:inline-block;background:#E8734A;color:#FFFFFF;font-size:16px;font-weight:700;padding:16px 40px;border-radius:12px;text-decoration:none;">Open Huddle</a>
    </div>
  </div>

  <!-- footer -->
  <div style="padding:24px 48px;text-align:center;">
    <div style="font-size:13px;font-weight:600;color:#78746C;">Log sets fast. Never lose a PR.</div>
    <div style="font-size:12px;color:#B0A99A;margin-top:6px;">&copy; 2026 Huddle</div>
  </div>
</div>

</body>
</html>
