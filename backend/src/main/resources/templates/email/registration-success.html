<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<meta name="supported-color-schemes" content="light dark">
<title>Huddle Registration Success Email</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { margin:0; font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif; padding:40px 0; }
  a { color:#B5542D; }
  a:hover { color:#8f3f1f; }

  @media (prefers-color-scheme: dark) {
    body { background:#12181A !important; }
    .email-card { background:#1B2422 !important; box-shadow:0 20px 50px rgba(0,0,0,0.5) !important; }
    .check-circle { background:#1E3A2C !important; }
    .check-mark { border-color:#6FBE95 !important; }
    .email-heading { color:#F2EDE1 !important; }
    .email-body-text { color:#C9C4B8 !important; }
    .footer-tagline { color:#9C978A !important; }
    .footer-copy { color:#726E62 !important; }
  }
</style>
</head>
<body bgcolor="#EDE7DA">

<table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" align="center" bgcolor="#F2EDE1" class="email-card" style="width:600px;margin:0 auto;border-radius:20px;overflow:hidden;box-shadow:0 20px 50px rgba(22,59,62,0.18);font-family:'Inter',sans-serif;">
<tr><td>

  <!-- header band -->
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#163B3E">
  <tr><td style="padding:36px 48px;">
    <img src="{{LOGO_URL}}" width="216" height="77" alt="Huddle" style="display:block;border:0;outline:none;text-decoration:none;">
  </td></tr>
  </table>

  <!-- body -->
  <div style="padding:48px;">
    <table role="presentation" width="56" cellpadding="0" cellspacing="0" border="0" bgcolor="#E7F0EA" class="check-circle" style="border-radius:50%;margin-bottom:22px;">
    <tr><td width="56" height="56" style="text-align:center;vertical-align:middle;">
      <div class="check-mark" style="width:16px;height:9px;border-left:3.5px solid #2F6B4F;border-bottom:3.5px solid #2F6B4F;transform:rotate(-45deg) translate(1px,-2px);display:inline-block;"></div>
    </td></tr>
    </table>
    <div class="email-heading" style="font-family:'Poppins',sans-serif;font-size:26px;font-weight:700;color:#163B3E;letter-spacing:-0.01em;margin-bottom:12px;">You're all set!</div>
    <div class="email-body-text" style="font-size:16px;line-height:1.6;color:#3F3A32;margin-bottom:32px;">Your Huddle account is confirmed and ready to go. Add the rest of your crew, pick your first exercise, and start logging sets &mdash; your history and PRs will be right there waiting every time you come back.</div>

    <table role="presentation" cellpadding="0" cellspacing="0" border="0" align="center" style="margin:0 auto;">
    <tr><td bgcolor="#E8734A" style="border-radius:12px;">
      <a href="{{APP_URL}}" style="display:inline-block;color:#FFFFFF;font-size:16px;font-weight:700;padding:16px 40px;text-decoration:none;">Open Huddle</a>
    </td></tr>
    </table>
  </div>

  <!-- footer -->
  <div style="padding:24px 48px;text-align:center;">
    <div class="footer-tagline" style="font-size:13px;font-weight:600;color:#78746C;">Log sets fast. Never lose a PR.</div>
    <div class="footer-copy" style="font-size:12px;color:#B0A99A;margin-top:6px;">&copy; 2026 Huddle</div>
  </div>

</td></tr>
</table>

</body>
</html>
