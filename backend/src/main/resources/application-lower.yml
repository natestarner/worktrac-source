spring:
  datasource:
    # No separate username/password here -- SPRING_DATASOURCE_URL (from the
    # SQL_CONNECTION_STRING_LOWER deploy secret) already embeds user=...;password=...
    # in the JDBC URL itself (see worktrac_SDLC_setup_guide.md section 7.8). These used
    # to be set to ${SPRING_DATASOURCE_USERNAME}/${SPRING_DATASOURCE_PASSWORD}, which were
    # never provided by the deploy workflow -- Spring passed the literal unresolved
    # "${SPRING_DATASOURCE_USERNAME}" string to SQL Server as the username, failing login
    # and crash-looping the container on every deploy.
    hikari:
      # Azure SQL free/serverless tiers auto-pause and cold-start on the first
      # connection after idling (see CLAUDE.md) -- give the pool enough time to wait
      # out a resume instead of failing app startup or the first request.
      connection-timeout: 60000
      initialization-fail-timeout: 60000
  jpa:
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    clean-disabled: true    # never allow clean outside local dev, even in lower env

app:
  rate-limit:
    # application.yml's production-sane defaults (10/hour per-IP, 30/hour global) are sized
    # for real internet-facing abuse resistance, not for the e2e-tests CI job -- one run
    # registers ~15 households, and Playwright's CI retry policy (2 retries per failing test)
    # means a single early 429 cascades into every subsequent test also registering 2-3x,
    # confirmed live 2026-07-13: the global cap was exhausted mid-run, failing 14 of 15 tests.
    # lower is internet-facing but has no real users (only e2e CI + manual testing), so it
    # gets headroom sized for CI bursts rather than local's effectively-unlimited 1000/1000 --
    # still meaningfully bounded, unlike local, since lower is a real deployed target.
    per-ip-per-hour: 100
    global-email-sends-per-hour: 200
