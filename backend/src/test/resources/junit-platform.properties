# Run test classes concurrently -- each class here spins up its own isolated
# Testcontainers SQL Server instance + Spring context, so classes are safe to
# run in parallel. Methods within a class stay sequential (same_thread) since
# they share one container/Spring context and haven't been audited for
# concurrent-safety against each other.
#
# parallelism is deliberately 1, not higher, on dev machines that also keep
# long-running SQL Server containers up outside the test run (see the
# CLAUDE.md note on worktrac-sqlserver/inttime-sqlserver) -- measured
# empirically after adding a new auth test class pushed a 4-way run over the
# host's available async-I/O resources and crashed every SQL Server
# Testcontainers instance outright ("Unable to create a new asynchronous I/O
# context... increase sysctl fs.aio-max-nr"). Counter-intuitively, 2-way
# parallelism didn't crash but was *slower* than 1 (4:22 vs 1:31 for the full
# suite -- individual classes went from ~46s to ~254s) because the containers
# thrash rather than parallelize once host resources are this contended. 1
# was the fastest and only reliably non-crashing option measured. If this
# needs to go faster again, the actual fix is freeing host resources (stop
# the always-on dev SQL containers before running the suite, or raise the
# Docker Desktop WSL2 VM's resource allocation / fs.aio-max-nr) rather than
# raising this number back up.
junit.jupiter.execution.parallel.enabled=true
junit.jupiter.execution.parallel.mode.default=same_thread
junit.jupiter.execution.parallel.mode.classes.default=concurrent
junit.jupiter.execution.parallel.config.strategy=fixed
junit.jupiter.execution.parallel.config.fixed.parallelism=1
